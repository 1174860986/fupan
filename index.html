<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>复盘官</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
button { padding:15px; font-size:18px; margin-top:20px; }
#result { margin-top:20px; white-space: pre-wrap; }
</style>
</head>
<body>

<h2>直播复盘官</h2>

<button onclick="startRecognition()"> 开始语音复盘</button>

<div id="result"></div>

<script>
const API_KEY = "app-PqaerVjymIzMfj6bRV4WP4XZ";
const API_URL = "https://api.dify.ai/v1/workflows/run";


function pickAnswer(data) {
  // 兼容多种返回结构
  return (
    data?.answer ||
    data?.data?.outputs?.text ||
    data?.data?.outputs?.result ||
    data?.data?.outputs?.output ||
    data?.data?.outputs?.response ||
    data?.data?.outputs?.final ||
    data?.data?.outputs?.content ||
    ""
  );
}

function speakText(text) {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-CN";
    u.rate = 1;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

async function runDify(text) {
  const controller = new AbortController();
  const t = setTimeout(() => controller.abort(), 10000); // 10秒超时

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      inputs: { query: text },
      response_mode: "blocking",
      user: "mobile-user"
    }),
    signal: controller.signal
  }).finally(() => clearTimeout(t));

  const raw = await res.text(); // 先拿原始文本，方便看报错
  let data = {};
  try { data = JSON.parse(raw); } catch (e) {}

  if (!res.ok) {
    // 把状态码 + 原始返回都显示出来
    throw new Error(`HTTP ${res.status}\n${raw || "(empty)"}`);
  }

  return { data, raw };
}

function ensureSpeakButton(answer) {
  // iOS 很可能需要“点一下”才肯出声，所以加个按钮
  let btn = document.getElementById("speakBtn");
  if (!btn) {
    btn = document.createElement("button");
    btn.id = "speakBtn";
    btn.innerText = " 播放语音";
    btn.style.marginTop = "12px";
    btn.onclick = () => speakText(answer);
    document.getElementById("result").appendChild(document.createElement("br"));
    document.getElementById("result").appendChild(btn);
  } else {
    btn.onclick = () => speakText(answer);
  }
}

function startRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert("当前浏览器不支持语音识别：请用 Android Chrome。iPhone 语音识别常不稳定。");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "zh-CN";

  recognition.onresult = async (event) => {
    const text = event.results[0][0].transcript;
    document.getElementById("result").innerText = "你说：\n" + text + "\n\n分析中...（最多10秒）";

    try {
      const { data, raw } = await runDify(text);
      const answer = pickAnswer(data);

      if (!answer) {
        document.getElementById("result").innerText =
          "拿到了返回，但没找到答案字段。\n\n原始返回：\n" + raw;
        return;
      }

      document.getElementById("result").innerText = "复盘结果：\n\n" + answer;

      // Android一般可直接播；iOS不一定，所以同时给按钮
      speakText(answer);
      ensureSpeakButton(answer);

    } catch (err) {
      document.getElementById("result").innerText =
        "请求失败（这就是你一直卡“分析中”的原因）：\n\n" + (err?.message || err);
    }
  };

  recognition.onerror = (e) => {
    document.getElementById("result").innerText = "语音识别错误：\n" + (e?.error || JSON.stringify(e));
  };

  recognition.start();
}
</script>
</body>
</html>
